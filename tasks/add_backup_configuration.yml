- name: create SSH config directory for rclone_ssh transport
  file:
    path: "{{_backup_lib_dir}}/ssh"
    owner: root
    mode: 0700
    state: directory
  when: _profile.value.restic_transport is defined and _profile.value.restic_transport == 'rclone_ssh'

- name: create SSH config for rclone_ssh transport ({{_profile.key}})
  template:
    src: ssh-config.j2
    dest: "{{_backup_lib_dir}}/ssh/{{_profile.key}}.conf"
    owner: root
    mode: 0600
  when: _profile.value.restic_transport is defined and _profile.value.restic_transport == 'rclone_ssh'

- name: ensure SSH identity file directory exists for rclone_ssh transport ({{_profile.key}})
  file:
    path: "{{_profile.value.rclone_ssh.identity_file | dirname}}"
    owner: root
    mode: 0700
    state: directory
  when:
    - _profile.value.restic_transport is defined and _profile.value.restic_transport == 'rclone_ssh'
    - _profile.value.rclone_ssh.identity_file_secret is defined

- name: deploy SSH identity file from password store for rclone_ssh transport ({{_profile.key}})
  template:
    src: identity-file.j2
    dest: "{{_profile.value.rclone_ssh.identity_file}}"
    owner: root
    mode: 0600
  when:
    - _profile.value.restic_transport is defined and _profile.value.restic_transport == 'rclone_ssh'
    - _profile.value.rclone_ssh.identity_file_secret is defined

- name: create backup configuration ({{_profile.key}}
  template:
    src: backup-profile.conf.j2
    dest: "{{_backup_profile_dir}}/{{_profile.key}}"

- name: create exclude configuration ({{_profile.key}}
  template:
    src: exclude.conf.j2
    dest: "{{_backup_exclude_dir}}/{{_profile.key}}.excludes"
  when: _profile.value.excludes is defined

# create profile secrets. we load global secrets first, and then profile secrets, and then export stuff
- name: create secrets configuration ({{_profile.key}}
  template:
    src: secrets.conf.j2
    dest: "{{_backup_secret_dir}}/{{_profile.key}}.secrets"
    mode: 0600
  when: _profile.value.secrets is defined

- name: create profile timer ({{_profile.key}}
  include_role:
    name: basic-host
    tasks_from: add_timer
  when: _profile.value.oncalendar is defined
  vars:
    systemd_timer_oncalendar: "{{_profile.value.oncalendar}}"
    systemd_timer_name: "backup@{{_profile.key}}"
    systemd_timer_add_service: False
